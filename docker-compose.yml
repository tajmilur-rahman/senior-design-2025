services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: ./backend/.env
    ports:
      - "8000:8000"

    command: >
      bash -c "
      if [ ! -f 'backend/rf_model.pkl' ]; then
        echo '🚀 INITIALIZING FRESH ML MODELS FOR DEMO...';
        python 'Random Forest ML/Train_Universal.py' --limit;
      fi &&
      echo '🟢 STARTING GUNICORN SERVER...' &&
      gunicorn -k uvicorn.workers.UvicornWorker -t 120 -w 1 -b 0.0.0.0:8000 backend.main:app
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend