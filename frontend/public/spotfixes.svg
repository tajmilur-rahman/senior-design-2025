<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0d0d22"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect width="32" height="32" rx="8" fill="none" stroke="rgba(129,140,248,0.2)" stroke-width="1"/>

  <!-- "S" lettermark -->
  <text
    x="16"
    y="23.5"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="800"
    font-size="22"
    fill="url(#letter)"
    text-anchor="middle"
    letter-spacing="-0.5"
  >S</text>
</svg>
