server {
    listen 80;
    server_name _;

    # Serve the React frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to the FastAPI backend
    location /api/ {
        # IMPORTANT: No trailing slash after port 8000 to keep the /api prefix
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTTP/1.1 required for SSE (Server-Sent Events) and keep-alive connections.
        # Without this nginx defaults to HTTP/1.0, which drops chunked-transfer streams
        # immediately, causing "Stream connection lost" in the Performance tab.
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Allow long-running requests (ML inference, training, SSE streams)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;

        # Disable buffering for SSE (Server-Sent Events) streaming
        proxy_buffering off;
        proxy_cache off;
    }
}
